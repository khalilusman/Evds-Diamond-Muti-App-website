events { worker_connections 1024; }

http {
    server_tokens off;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name nexus.evdsdiamond.com
                    dashboard.evdsdiamond.com
                    api.evdsdiamond.com;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Nexus
    server {
        listen 443 ssl;
        server_name nexus.evdsdiamond.com;
        ssl_certificate /etc/letsencrypt/live/nexus.evdsdiamond.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexus.evdsdiamond.com/privkey.pem;
        location / {
            proxy_pass http://nexus:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Dashboard
    server {
        listen 443 ssl;
        server_name dashboard.evdsdiamond.com;
        ssl_certificate /etc/letsencrypt/live/nexus.evdsdiamond.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexus.evdsdiamond.com/privkey.pem;
        location / {
            proxy_pass http://dashboard:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # API
    server {
        listen 443 ssl;
        server_name api.evdsdiamond.com;
        ssl_certificate /etc/letsencrypt/live/nexus.evdsdiamond.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nexus.evdsdiamond.com/privkey.pem;
        client_max_body_size 20M;
        location / {
            proxy_pass http://api:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
